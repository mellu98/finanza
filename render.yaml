services:
  - type: web
    name: daily-coach
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node server.mjs
    autoDeploy: true
    branch: main
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
