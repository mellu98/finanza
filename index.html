	<!-- Bump this stamp on every release. The inline script below
	     runs on every page load (even when served by an old SW that
	     still has the old bundle cached). If the stored stamp in
	     localStorage differs from this one, it nukes ALL service
	     workers and Cache Storage entries, then reloads — bypassing
	     any stale precache the old SW may be holding onto. This is
	     the nuclear option for users stuck on a previous build. -->
	<meta name="app-bump-stamp" content="v0.2.0-2026-06-12" />
	<script>
		(function () {
			try {
				var meta = document.querySelector('meta[name="app-bump-stamp"]');
				// If this page doesn't have the stamp meta, it's an OLD
				// build — bail out and let the controllerchange handler
				// below reload us into the new HTML naturally.
				if (!meta) {
					if ("serviceWorker" in navigator) {
						navigator.serviceWorker.addEventListener("controllerchange", function () {
							if (window.__dfcReloaded) return;
							window.__dfcReloaded = true;
							window.location.reload();
						});
					}
					return;
				}
				var current = meta.getAttribute("content");
				var stored = localStorage.getItem("dfc_app_stamp");
				// Always set up the controllerchange handler so any in-flight
				// SW update triggers a clean reload.
				if ("serviceWorker" in navigator) {
					navigator.serviceWorker.addEventListener("controllerchange", function () {
						if (window.__dfcReloaded) return;
						window.__dfcReloaded = true;
						window.location.reload();
					});
				}
				if (stored && stored !== current) {
					window.__dfcSelfDestruct = true;
					(async function nuke() {
						try {
							if ("serviceWorker" in navigator) {
								var regs = await navigator.serviceWorker.getRegistrations();
								await Promise.all(
									regs.map(function (r) { return r.unregister(); })
								);
							}
						} catch (e) { /* ignore */ }
						try {
							if ("caches" in window) {
								var keys = await caches.keys();
								await Promise.all(
									keys.map(function (k) { return caches.delete(k); })
								);
							}
						} catch (e) { /* ignore */ }
						try {
							localStorage.setItem("dfc_app_stamp", current);
						} catch (e) { /* ignore */ }
						window.location.reload();
					})();
				} else if (!stored) {
					try { localStorage.setItem("dfc_app_stamp", current); } catch (e) { /* ignore */ }
				}
			} catch (e) { /* localStorage blocked: bail silently */ }
		})();
	</script>

	<!-- SRI-hashed inline critical CSS for first-paint stability -->
	<style>
		/* Critical above-the-fold styles so the app shell appears instantly
		   even before the bundle hydrates. Colors match the Warm theme tokens. */
		html,
		body {
			margin: 0;
			padding: 0;
			background: #faf8f4;
			color: #1c1917;
			font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			text-rendering: optimizeLegibility;
			overscroll-behavior-y: contain;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		html.dark,
		html.dark body {
			background: #1c1917;
			color: #faf8f4;
		}

		#root {
			min-height: 100dvh;
			min-height: -webkit-fill-available;
			display: flex;
			flex-direction: column;
		}

		/* Splash loader shown until React hydrates */
		.app-splash {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100dvh;
			gap: 1.5rem;
			padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
				env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
		}
		.app-splash-logo {
			width: 96px;
			height: 96px;
			border-radius: 24px;
			background: linear-gradient(135deg, #a78bfa, #8b5cf6 50%, #6d28d9);
			box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.5);
			display: flex;
			align-items: center;
			justify-content: center;
			color: white;
			font-weight: 800;
			font-size: 3rem;
			letter-spacing: -0.04em;
			animation: splash-pulse 1.4s ease-in-out infinite;
		}
		.app-splash-title {
			font-size: 1.5rem;
			font-weight: 700;
			letter-spacing: -0.025em;
		}
		.app-splash-subtitle {
			font-size: 0.875rem;
			opacity: 0.6;
		}
		@keyframes splash-pulse {
			0%, 100% { transform: scale(1); opacity: 1; }
			50% { transform: scale(0.95); opacity: 0.85; }
		}
		@media (prefers-reduced-motion: reduce) {
			.app-splash-logo { animation: none; }
		}
	</style>
</head>

		</div>
	</noscript>

	<!-- Pre-hydration splash: removed by React on mount -->
	<div id="root">

			<div class="app-splash-logo">€</div>
			<div class="app-splash-title">Daily Coach</div>
			<div class="app-splash-subtitle">Caricamento…</div>
		</div>
