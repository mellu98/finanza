<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#faf8f4" />
	<title>Offline — Daily Coach</title>
	<style>
		* { box-sizing: border-box; }
		html, body {
			margin: 0;
			padding: 0;
			min-height: 100dvh;
			background: #faf8f4;
			color: #1c1917;
			font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
			-webkit-font-smoothing: antialiased;
		}
		.wrap {
			min-height: 100dvh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem 1.5rem;
			padding-top: max(2rem, env(safe-area-inset-top));
			padding-bottom: max(2rem, env(safe-area-inset-bottom));
			text-align: center;
		}
		.icon {
			width: 6rem;
			height: 6rem;
			border-radius: 1.5rem;
			background: linear-gradient(135deg, #a78bfa, #8b5cf6 50%, #6d28d9);
			display: grid;
			place-items: center;
			margin-bottom: 2rem;
			box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.5);
		}
		.icon svg { width: 3rem; height: 3rem; color: white; }
		h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.025em; margin: 0 0 0.5rem; }
		p { color: #78716c; margin: 0 0 0.25rem; line-height: 1.5; }
		button {
			margin-top: 2rem;
			padding: 0.875rem 1.5rem;
			border-radius: 9999px;
			border: 0;
			background: #1c1917;
			color: #faf8f4;
			font-weight: 600;
			font-size: 1rem;
			cursor: pointer;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
			min-height: 44px;
		}
		button:active { transform: scale(0.97); }
		.status {
			margin-top: 2.5rem;
			padding: 1rem 1.25rem;
			border: 1px solid #e7e5e4;
			border-radius: 1rem;
			background: rgba(255, 255, 255, 0.6);
			max-width: 24rem;
			width: 100%;
			text-align: left;
			font-size: 0.875rem;
		}
		.status .row {
			display: flex;
			justify-content: space-between;
			padding: 0.375rem 0;
		}
		.status .row .label { color: #78716c; }
		.status .row .value { font-weight: 600; }
		.green { color: #047857; }
		.red { color: #b91c1c; }
		.foot { margin-top: 2rem; font-size: 0.75rem; color: #a8a29e; }
	</style>
</head>

<body>
	<div class="wrap">
		<div class="icon">
			<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
				<path stroke-linecap="round" stroke-linejoin="round"
					d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" />
			</svg>
		</div>
		<h1>Sei offline</h1>
		<p>Niente connessione, ma i tuoi dati sono al sicuro sul dispositivo.</p>
		<p>Riapri l'app quando torni online.</p>
		<button onclick="window.location.reload()">Riprova</button>
		<div class="status">
			<div class="row">
				<span class="label">Stato rete</span>
				<span class="value red" id="net">Disconnesso</span>
			</div>
			<div class="row">
				<span class="label">Dati locali</span>
				<span class="value green">Sincronizzati</span>
			</div>
			<div class="row">
				<span class="label">Cache app</span>
				<span class="value green">Disponibile</span>
			</div>
		</div>
		<div class="foot">Daily Coach è local-first: nessun dato lascia il tuo dispositivo.</div>
	</div>
	<script>
		function update() {
			var el = document.getElementById('net');
			el.textContent = navigator.onLine ? 'Connesso' : 'Disconnesso';
			el.className = 'value ' + (navigator.onLine ? 'green' : 'red');
		}
		window.addEventListener('online', update);
		window.addEventListener('offline', update);
		update();
	</script>
</body>

</html>
